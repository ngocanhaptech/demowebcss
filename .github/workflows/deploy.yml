name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Inject Cloudinary Secrets
        run: |
          sed -i 's/{{CLOUDINARY_NAME}}/${{ secrets.CLOUDINARY_NAME }}/g' index.html
          sed -i 's/{{CLOUDINARY_PRESET}}/${{ secrets.CLOUDINARY_PRESET }}/g' index.html

          # (Log Action)
          echo "Kiểm tra dòng code sau khi tiêm:"
          grep "const CLOUD_NAME =" index.html
      - name: Deploy to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: . 
          branch: gh-pages