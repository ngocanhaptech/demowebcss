name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Inject Cloudinary Secrets
        run: |
          # Tìm tất cả file .html và thực hiện thay thế (phòng trường hợp file nằm trong folder)
          find . -name "*.html" -type f -exec sed -i "s|{{CLOUDINARY_NAME}}|${{ secrets.CLOUDINARY_NAME }}|g" {} +
          find . -name "*.html" -type f -exec sed -i "s|{{CLOUDINARY_PRESET}}|${{ secrets.CLOUDINARY_PRESET }}|g" {} +
          
          echo "--- KIỂM TRA KẾT QUẢ ---"
          # Tìm và in ra dòng chứa CLOUD_NAME để xác nhận
          grep -r "CLOUD_NAME =" . || echo "Không tìm thấy dòng CLOUD_NAME trong bất kỳ file nào!"

          # (Log Action)
          echo "Kiểm tra dòng code sau khi tiêm:"
          grep "const CLOUD_NAME =" index.html
      - name: Deploy to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: . 
          branch: gh-pages