name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code 
        uses: actions/checkout@v3

      - name: Inject Secrets 💉
        run: |
          # Thực hiện thay thế cho cả 3 biến
          sed -i "s|{{CLOUDINARY_NAME}}|${{ secrets.CLOUDINARY_NAME }}|g" tools/upload/index.html
          sed -i "s|{{CLOUDINARY_PRESET}}|${{ secrets.CLOUDINARY_PRESET }}|g" tools/upload/index.html
          sed -i "s|{{GOOGLE_SCRIPT_URL}}|${{ secrets.GOOGLE_SCRIPT_URL }}|g" tools/upload/index.html
          
          echo "--- KIỂM TRA TRẠNG THÁI ---"
          ls -l tools/upload/index.html
          echo "Đã Inject Secret thành công."

      - name: Deploy to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: . 
          branch: gh-pages