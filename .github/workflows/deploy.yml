name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Inject Cloudinary Secrets
        run: |
          sed -i "s/__CLOUDINARY_NAME__/${{ secrets.CLOUDINARY_NAME }}/g" index.html
          sed -i "s/__CLOUDINARY_PRESET__/${{ secrets.CLOUDINARY_PRESET }}/g" index.html

      - name: Deploy to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: . 
          branch: gh-pages