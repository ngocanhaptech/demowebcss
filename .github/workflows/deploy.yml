name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Inject Cloudinary Secrets
        run: |
          # 1. Thực hiện thay thế trong file nằm ở thư mục tools/upload/
          sed -i "s|{{CLOUDINARY_NAME}}|${{ secrets.CLOUDINARY_NAME }}|g" tools/upload/index.html
          sed -i "s|{{CLOUDINARY_PRESET}}|${{ secrets.CLOUDINARY_PRESET }}|g" tools/upload/index.html
          
          echo "--- KIỂM TRA KẾT QUẢ ---"
          # 2. Kiểm tra lại file đó xem đã được thay thế chưa
          grep "const CLOUD_NAME =" tools/upload/index.html || echo "Vẫn chưa tìm thấy dòng code trong file!"
      - name: Deploy to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: . 
          branch: gh-pages