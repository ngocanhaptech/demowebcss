<!DOCTYPE html>
<html>
  <head>
    <title>Contact Page</title>
    <link rel="stylesheet" href="/react/babel-standalone/css/styles.css">
  </head>
<body>
    <main id="root"></main>
<!-- This setup is not suitable for production. -->
<!-- Only use it in development! -->
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script async src="https://ga.jspm.io/npm:es-module-shims@1.7.0/dist/es-module-shims.js"></script>
<script type="importmap">
{
  "imports": {
    "react": "https://esm.sh/react?dev",
    "react-dom/client": "https://esm.sh/react-dom/client?dev"
  }
}
</script>
<script type="text/babel" data-type="module">
import React, { StrictMode } from 'react';
import { createRoot } from 'react-dom/client';
/** Contact page */
import { useState } from 'react';

function Contact() {
  const password = 'swordfish';
  const [authorized, setAuthorized] = useState(false);

  function handleSubmit(e) {
    // QUAN TRỌNG: Chặn trình duyệt reload trang
    e.preventDefault(); 
    
    // Lấy giá trị password từ input
    const enteredPassword = e.target.querySelector('input[type="password"]').value;
    
    const auth = enteredPassword === password;
    setAuthorized(auth);
  }

  // Tách form ra để code sạch sẽ hơn
  const loginForm = (
    <form onSubmit={handleSubmit}>
      <input type="password" placeholder="Password" />
      <button type="submit">Submit</button>
    </form>
  );

  const contactInfo = (
    <ul>
      <li>client@example.com</li>
      <li>555.555.5555</li>
    </ul>
  );

  return (
    <div id="authorization">
      <h1>{authorized ? 'Contact Information' : 'Enter the Password'}</h1>
      {/* Logic hiển thị theo điều kiện */}
      { !authorized ? loginForm : contactInfo }
    </div>
  );
}

// export default Contact;
/** End Contact page */

let App = function MyApp() {
  return (
      <Contact />
  );
}
const root = createRoot(document.getElementById('root'));
root.render(
  <StrictMode>
    <App />
  </StrictMode>
);
</script>
</html>
