<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hệ thống Quản lý Ảnh Sách</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; padding: 20px; max-width: 600px; margin: 0 auto; background-color: #f4f7f6; }
        .container { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        h2 { color: #333; border-bottom: 2px solid #007bff; padding-bottom: 10px; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; color: #555; }
        input[type="text"], textarea { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 5px; box-sizing: border-box; }
        .upload-section { border: 2px dashed #007bff; padding: 20px; text-align: center; border-radius: 10px; background: #f8fbff; margin: 20px 0; }
        #preview-img { max-width: 100%; max-height: 250px; display: none; margin: 15px auto; border-radius: 5px; border: 1px solid #eee; }
        .btn-upload { background: #007bff; color: white; padding: 12px 25px; border: none; border-radius: 5px; cursor: pointer; width: 100%; font-size: 16px; font-weight: bold; transition: 0.3s; }
        .btn-upload:hover { background: #0056b3; }
        .btn-upload:disabled { background: #ccc; cursor: not-allowed; }
        #status { margin-top: 15px; text-align: center; font-weight: bold; min-height: 1.2em; }
        #result-link { margin-top: 15px; background: #e9ecef; display: none; cursor: pointer; }
        
        /* Thư viện Grid */
        .gallery-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 15px; margin-top: 20px; }
        .gallery-item { background: white; padding: 10px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); text-align: center; }
        .gallery-item img { width: 100%; height: 120px; object-fit: cover; border-radius: 4px; cursor: pointer; }
        .gallery-item p { font-size: 12px; margin-top: 5px; font-weight: bold; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .btn-page { background: #fff; border: 1px solid #007bff; color: #007bff; padding: 5px 15px; border-radius: 4px; cursor: pointer; }
        .btn-page:disabled { border-color: #ccc; color: #ccc; cursor: not-allowed; }
    </style>
</head>
<body>

<div class="container">
    <h2>Thông Tin Sách</h2>
    
    <div class="form-group">
        <label>Tiêu đề sách (title):</label>
        <input type="text" id="book-title" placeholder="Nhập tên sách...">
    </div>

    <div class="form-group">
        <label>Mã cửa hàng (store_id):</label>
        <input type="text" id="store-id" value="seovnorg-20">
    </div>

    <div class="form-group">
        <label>Mô tả (description):</label>
        <textarea id="description" rows="2" placeholder="Nhập mô tả ngắn..."></textarea>
    </div>

    <div class="form-group">
        <label>Aff Link (aff_link):</label>
        <textarea id="aff_link" rows="2" placeholder="Nhập liên kết..."></textarea>
    </div>

    <div class="form-group">
        <label>Giá (price):</label>
        <input type="text" id="price" value="0">
    </div>

    <div class="upload-section">
        <label style="cursor: pointer; color: #007bff;">
            <strong>📁 Chọn ảnh sách</strong>
            <input type="file" id="file-input" accept="image/*" style="display: block;margin: auto;">
        </label>
        <img id="preview-img" src="" alt="Xem trước">
        <div id="status">Vui lòng chọn ảnh...</div>
    </div>

    <button class="btn-upload" id="upload-btn" onclick="processAll()" disabled>TẢI LÊN & LƯU VÀO SHEET</button>
    <input type="text" id="result-link" readonly title="Click để copy link">
</div>

<div class="container" style="margin-top: 30px;">
    <h2>📚 Thư viện ảnh đã lưu</h2>
    <div class="form-group">
        <input type="text" id="search-input" onkeyup="filterBooks()" placeholder="🔍 Nhập tên sách để tìm nhanh...">
    </div>
    <button onclick="loadGallery()" style="margin-bottom: 15px; width: 100%; padding: 10px; cursor: pointer;">🔄 Làm mới danh sách</button>
    
    <div id="gallery" class="gallery-grid"></div>

    <div id="pagination-controls" style="text-align: center; margin-top: 20px; display: flex; justify-content: center; gap: 10px; align-items: center;">
        <button id="prev-btn" onclick="changePage(-1)" class="btn-page">⬅️ Trước</button>
        <span id="page-info" style="font-weight: bold;">Trang 1 / 1</span>
        <button id="next-btn" onclick="changePage(1)" class="btn-page">Sau ➡️</button>
    </div>
</div>

<script>
    // --- CẤU HÌNH ---
    let CLOUD_NAME = '{{CLOUDINARY_NAME}}';
    let UPLOAD_PRESET = '{{CLOUDINARY_PRESET}}';
    let GOOGLE_SCRIPT_URL = 'https://script.google.com/macros/s/{{GOOGLE_SCRIPT_URL}}/exec'; 

    if (CLOUD_NAME.includes('{{')) {
        CLOUD_NAME = 'dycwkcxiu'; 
        UPLOAD_PRESET = 'googlesheet';
        GOOGLE_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbxmldsqkRcMM_tKsYw1TMtkVuBBiDE5SPVAULMr_etIc7QsHYRn0uiLm17Zo_WX54PD/exec';
    }

    const fileInput = document.getElementById('file-input');
    const uploadBtn = document.getElementById('upload-btn');
    const previewImg = document.getElementById('preview-img');
    const statusDiv = document.getElementById('status');
    const resultLinkInput = document.getElementById('result-link');

    // Biến cho Thư viện & Phân trang
    let allBooks = [];         
    let filteredBooks = [];    
    let currentPage = 1;       
    const rowsPerPage = 6;

    // 1. Upload logic (giữ nguyên của bạn)
    fileInput.addEventListener('change', function(e) {
        const file = e.target.files[0];
        if (file) {
            const reader = new FileReader();
            reader.onload = (ev) => {
                previewImg.src = ev.target.result;
                previewImg.style.display = 'block';
                uploadBtn.disabled = false;
                statusDiv.innerText = "Sẵn sàng!";
            };
            reader.readAsDataURL(file);
        }
    });

    async function processAll() {
        const file = fileInput.files[0];
        const title = document.getElementById('book-title').value;
        if (!title) { alert("Vui lòng nhập tiêu đề!"); return; }
        
        statusDiv.innerText = "⏳ Đang xử lý...";
        uploadBtn.disabled = true;

        try {
            const formData = new FormData();
            formData.append('file', file);
            formData.append('upload_preset', UPLOAD_PRESET);
            const clouResp = await fetch(`https://api.cloudinary.com/v1_1/${CLOUD_NAME}/image/upload`, { method: 'POST', body: formData });
            const clouData = await clouResp.json();
            const imageUrl = clouData.secure_url;

            const payload = {
                short_link: imageUrl,
                store_id: document.getElementById('store-id').value,
                title: title,
                thumb: imageUrl,
                description: document.getElementById('description').value,
                aff_link: document.getElementById('aff_link').value,
                price: document.getElementById('price').value
            };

            await fetch(GOOGLE_SCRIPT_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(payload) });

            // --- Bước Hoàn tất ---
            
            // 1. Thông báo
            statusDiv.innerText = "✅ TẠO MỚI THÀNH CÔNG!";
            resultLinkInput.value = imageUrl;
            resultLinkInput.style.display = 'block';

            // 2. RESET FORM (Xóa trắng các ô nhập liệu)
            document.getElementById('book-title').value = "";
            document.getElementById('description').value = "";
            document.getElementById('aff_link').value = "";
            fileInput.value = ""; // Xóa file đã chọn
            previewImg.style.display = 'none'; // Ẩn ảnh xem trước
            uploadBtn.disabled = true; // Khóa nút lại cho lần sau
            
            
            // 3. Tải lại thư viện để hiện ảnh mới nhất
            loadGallery();

        } catch (error) {
            statusDiv.innerText = "❌ Lỗi!";
            uploadBtn.disabled = false;
        }
    }

    // 2. Thư viện & Phân trang logic (ĐÃ HỢP NHẤT)
    async function loadGallery() {
        const galleryDiv = document.getElementById('gallery');
        galleryDiv.innerHTML = "<p>⏳ Đang tải dữ liệu...</p>";
        try {
            const response = await fetch(GOOGLE_SCRIPT_URL);
            allBooks = await response.json();
            filteredBooks = [...allBooks]; 
            currentPage = 1;
            renderCurrentPage(); 
        } catch (error) {
            galleryDiv.innerHTML = "❌ Lỗi kết nối API!";
        }
    }

    function renderCurrentPage() {
        const totalPages = Math.ceil(filteredBooks.length / rowsPerPage) || 1;
        if (currentPage > totalPages) currentPage = totalPages;
        if (currentPage < 1) currentPage = 1;

        const start = (currentPage - 1) * rowsPerPage;
        const end = start + rowsPerPage;
        const pageData = filteredBooks.slice(start, end);

        renderGallery(pageData); 

        document.getElementById('page-info').innerText = `Trang ${currentPage} / ${totalPages}`;
        document.getElementById('prev-btn').disabled = (currentPage === 1);
        document.getElementById('next-btn').disabled = (currentPage === totalPages || filteredBooks.length === 0);
    }

    function renderGallery(data) {
        const galleryDiv = document.getElementById('gallery');
        galleryDiv.innerHTML = ""; 
        if (data.length === 0) {
            galleryDiv.innerHTML = "<p style='grid-column: 1/-1;'>Không có dữ liệu.</p>";
            return;
        }
        data.forEach(item => {
            const card = document.createElement('div');
            card.className = 'gallery-item';
            card.innerHTML = `
                <img src="${item.thumb}" onclick="window.open('${item.short_link}', '_blank')">
                <p title="${item.title}">${item.title || 'Không tiêu đề'}</p>
                <span style="font-size: 10px; color: #888;">${item.store_id}</span>
            `;
            galleryDiv.appendChild(card);
        });
    }

    function changePage(step) {
        currentPage += step;
        renderCurrentPage();
        document.getElementById('gallery').scrollIntoView({ behavior: 'smooth' });
    }

    function filterBooks() {
        const searchTerm = document.getElementById('search-input').value.toLowerCase();
        filteredBooks = allBooks.filter(book => (book.title || "").toLowerCase().includes(searchTerm));
        currentPage = 1; 
        renderCurrentPage();
    }

    window.onload = loadGallery;
</script>
</body>
</html>
